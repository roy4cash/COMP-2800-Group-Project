<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAT - Financial Activity Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div class="header-inner">
        <div class="logo">
            <span class="logo-icon">$</span>
            <div>
                <div class="logo-title">FAT</div>
                <div class="logo-sub" id="tagline">Financial Activity Tracker</div>
            </div>
        </div>
        <div id="monthLabel" class="month-label"></div>
    </div>
</header>

<main>
    <div id="alertBanner" class="alert-banner alert-ok"></div>

    <div class="cards-grid">
        <div class="card">
            <div class="card-label">Primary App</div>
            <div class="card-value" id="primaryApp">Java Swing</div>
        </div>
        <div class="card">
            <div class="card-label">Database</div>
            <div class="card-value" id="databaseType">MySQL</div>
        </div>
        <div class="card">
            <div class="card-label">Deployment</div>
            <div class="card-value" id="deployTarget">Azure VM</div>
        </div>
    </div>

    <div class="content-grid">
        <div class="left-col">
            <div class="panel">
                <h2 class="panel-title">Project Summary</h2>
                <div id="projectSummary" class="no-data" style="text-align:left"></div>
            </div>

            <div class="panel">
                <h2 class="panel-title">Desktop Stack</h2>
                <div class="table-wrap">
                    <table>
                        <tbody id="stackTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="panel full-height">
                <h2 class="panel-title">Launch Checklist</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Step</th>
                                <th>What To Do</th>
                            </tr>
                        </thead>
                        <tbody id="stepsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="app.js"></script>
</body>
</html>
