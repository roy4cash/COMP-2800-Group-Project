<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAT — Financial Activity Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo">
            <span class="logo-icon">💰</span>
            <div>
                <div class="logo-title">FAT</div>
                <div class="logo-sub">Financial Activity Tracker</div>
            </div>
        </div>
        <div id="monthLabel" class="month-label"></div>
    </div>
</header>

<main>

    <!-- Alert Banner -->
    <div id="alertBanner" class="alert-banner hidden"></div>

    <!-- Summary Cards -->
    <div class="cards-grid">
        <div class="card">
            <div class="card-label">Monthly Budget</div>
            <div class="card-value" id="budgetAmount">$0.00</div>
        </div>
        <div class="card">
            <div class="card-label">Total Spent</div>
            <div class="card-value danger" id="spentAmount">$0.00</div>
        </div>
        <div class="card">
            <div class="card-label">Remaining</div>
            <div class="card-value" id="remainingAmount">$0.00</div>
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-section">
        <div class="progress-track">
            <div id="progressFill" class="progress-fill"></div>
        </div>
        <div id="progressLabel" class="progress-label">0% of budget used</div>
    </div>

    <!-- Main Content -->
    <div class="content-grid">

        <!-- Left Column -->
        <div class="left-col">

            <!-- Add Expense -->
            <div class="panel">
                <h2 class="panel-title">Add Expense</h2>
                <form id="expenseForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Category</label>
                            <select id="categorySelect"></select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="description" placeholder="e.g. Grocery run">
                    </div>
                    <div class="form-row two-col">
                        <div class="form-group">
                            <label>Amount ($)</label>
                            <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01">
                        </div>
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" id="expenseDate">
                        </div>
                    </div>
                    <div id="formError" class="msg error hidden"></div>
                    <button type="submit" class="btn btn-primary">+ Add Expense</button>
                </form>
            </div>

            <!-- Set Budget -->
            <div class="panel">
                <h2 class="panel-title">Monthly Budget</h2>
                <div class="budget-row">
                    <input type="number" id="budgetInput" placeholder="Enter amount..." step="0.01" min="0">
                    <button onclick="setBudget()" class="btn btn-outline">Set Budget</button>
                </div>
                <div id="budgetMsg" class="msg hidden"></div>
            </div>

            <!-- Chart -->
            <div class="panel">
                <h2 class="panel-title">Spending by Category</h2>
                <div class="chart-wrap">
                    <canvas id="spendingChart"></canvas>
                    <div id="noChartData" class="no-data hidden">No expenses this month yet.</div>
                </div>
            </div>

        </div>

        <!-- Right Column: Transaction Table -->
        <div class="right-col">
            <div class="panel full-height">
                <h2 class="panel-title">Transaction History</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Description</th>
                                <th>Amount</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="expenseTableBody">
                            <tr><td colspan="5" class="no-data">No expenses yet.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</main>

<script src="app.js"></script>
</body>
</html>
